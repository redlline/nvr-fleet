services:
  nginx:
    build: ./nginx
    container_name: nvr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TLS_CERT_DIR: /etc/nginx/certs
      TLS_FULLCHAIN_PATH: /etc/nginx/certs/fullchain.pem
      TLS_PRIVKEY_PATH: /etc/nginx/certs/privkey.pem
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - admin-ui
      - fleet-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mediamtx:
    image: bluenviron/mediamtx:1.11.3
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /var/recordings:/recordings
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "3" }

  fleet-server:
    build:
      context: .
      dockerfile: fleet-server/Dockerfile
    container_name: fleet-server
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "20080-20179:20080-20179"
      - "25554-25653:25554-25653"
      - "28000-28099:28000-28099"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "sqlite:////app/data/fleet.db"
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      PUBLIC_WEB_SCHEME: ${PUBLIC_SCHEME:-}
      RTSP_PORT: "8554"
      MEDIAMTX_API_USER: "mediamtx-internal"
      MEDIAMTX_API_PASS: ${MEDIAMTX_INTERNAL_PASS}
      MEDIAMTX_VIEWER_PASS: ${MEDIAMTX_VIEWER_PASS}
      MEDIAMTX_API: "http://mediamtx-internal:${MEDIAMTX_INTERNAL_PASS}@host.docker.internal:9997"
      MEDIAMTX_HLS_PROXY_TARGET: "http://host.docker.internal:8888"
      MEDIAMTX_YAML: "/app/mediamtx/mediamtx.yml"
      TUNNEL_HTTP_START: "20080"
      TUNNEL_HTTP_END: "20179"
      TUNNEL_RTSP_START: "25554"
      TUNNEL_RTSP_END: "25653"
      TUNNEL_CONTROL_START: "28000"
      TUNNEL_CONTROL_END: "28099"
      TLS_CERT_DIR: "/app/tls"
      TLS_FULLCHAIN_PATH: "/app/tls/fullchain.pem"
      TLS_PRIVKEY_PATH: "/app/tls/privkey.pem"
    volumes:
      - ./data:/app/data
      - ./mediamtx:/app/mediamtx
      - ./backups:/app/backups
      - ./nginx/certs:/app/tls
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/systemd/private:/run/systemd/private
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    expose:
      - "8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  admin-ui:
    build: ./admin-ui
    container_name: nvr-admin-ui
    restart: unless-stopped
    depends_on:
      - fleet-server
    expose:
      - "80"
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }
