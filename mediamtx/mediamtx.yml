api: true
apiAddress: :9997
authInternalUsers:
- ips: []
  pass: VIEWER_PASS
  permissions:
  - action: read
  - action: playback
  user: viewer
- ips:
  pass: MEDIAMTX_INTERNAL_PASS
  permissions:
  - action: api
  - action: metrics
