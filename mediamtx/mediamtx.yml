# mediamtx.yml — базовая конфигурация MediaMTX
# ВАЖНО: Этот файл перезаписывается fleet-server при деплое площадки.
# Реальные credentials (authInternalUsers) генерируются из переменных окружения.
# НЕ хранить пароли в этом файле вручную.

logLevel: info
logDestinations:
  - stdout

api: true
apiAddress: :9997

metrics: true
metricsAddress: :9998

rtsp: true
rtspAddress: :8554

hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

webrtc: true
webrtcAddress: :8889

# authMethod и authInternalUsers задаются fleet-server при деплое.
# До первого деплоя доступ к MediaMTX закрыт.
authMethod: internal
authInternalUsers:
  - user: placeholder
    pass: placeholder
    ips: []
    permissions: []

paths: {}
