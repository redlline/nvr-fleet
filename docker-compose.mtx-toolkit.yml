# MTX Toolkit — external add-on compose file
#
# SOURCE REQUIRED: The backend and frontend services build from MTX Toolkit source,
# which is NOT included in this repo. Before running build services:
#
#   git clone https://github.com/Dan-Calvert/mtx-toolkit addons/mtx-toolkit
#
# Services are split into profiles:
#   (no profile)   — infrastructure only: postgres, redis
#   build          — application services that require ./addons/mtx-toolkit/
#
# To start everything after cloning addons:
#   docker compose -f docker-compose.mtx-toolkit.yml --profile build up -d
#
# Environment variables required in .env:
#   MTX_UI_USER             — username for nginx basic auth on port 3001
#   MTX_UI_PASSWORD         — password for nginx basic auth (no default; must be set)
#   MEDIAMTX_VIEWER_PASS    — read-only viewer password for MediaMTX RTSP/HLS
#   MEDIAMTX_INTERNAL_PASS  — internal API password (fleet-server <-> mediamtx)
#   PUBLIC_HOST             — public hostname
#   PUBLIC_SCHEME           — http or https (default: https)

services:
  mtx-toolkit-backend:
    profiles: [build]
    build:
      context: ./addons/mtx-toolkit/backend
      dockerfile: Dockerfile
    container_name: mtx-toolkit-backend
    restart: unless-stopped
    ports:
      - "5002:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://mtx:mtx_password@mtx-toolkit-postgres:5432/mtx_toolkit
      REDIS_URL: redis://mtx-toolkit-redis:6379/0
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-https}
      MEDIAMTX_API_URL: http://mediamtx-internal:${MEDIAMTX_INTERNAL_PASS}@host.docker.internal:9997
      MEDIAMTX_RTSP_URL: rtsp://viewer:${MEDIAMTX_VIEWER_PASS}@host.docker.internal:8554
      MEDIAMTX_HLS_PORT: "8888"
      RECORDING_BASE_PATH: /recordings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/recordings:/recordings
    depends_on:
      mtx-toolkit-postgres:
        condition: service_healthy
      mtx-toolkit-redis:
        condition: service_started

  mtx-toolkit-frontend:
    profiles: [build]
    build:
      context: ./addons/mtx-toolkit/frontend
      dockerfile: Dockerfile
    container_name: mtx-toolkit-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      MTX_UI_USER: ${MTX_UI_USER:-admin}
      MTX_UI_PASSWORD: ${MTX_UI_PASSWORD}
    volumes:
      - ./mtx-toolkit/frontend.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./mtx-toolkit/entrypoint.sh:/docker-entrypoint.d/40-htpasswd.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mtx-toolkit-backend

  mtx-toolkit-postgres:
    image: postgres:16-alpine
    container_name: mtx-toolkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtx
      POSTGRES_PASSWORD: mtx_password
      POSTGRES_DB: mtx_toolkit
    ports:
      - "15433:5432"
    volumes:
      - mtx_toolkit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtx -d mtx_toolkit"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mtx-toolkit-redis:
    image: redis:7-alpine
    container_name: mtx-toolkit-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - mtx_toolkit_redis_data:/data

  mtx-toolkit-celery-worker:
    profiles: [build]
    build:
      context: ./addons/mtx-toolkit/backend
      dockerfile: Dockerfile
    container_name: mtx-toolkit-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://mtx:mtx_password@mtx-toolkit-postgres:5432/mtx_toolkit
      REDIS_URL: redis://mtx-toolkit-redis:6379/0
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-https}
      MEDIAMTX_API_URL: http://mediamtx-internal:${MEDIAMTX_INTERNAL_PASS}@host.docker.internal:9997
      MEDIAMTX_RTSP_URL: rtsp://viewer:${MEDIAMTX_VIEWER_PASS}@host.docker.internal:8554
      MEDIAMTX_HLS_PORT: "8888"
      RECORDING_BASE_PATH: /recordings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/recordings:/recordings
    depends_on:
      mtx-toolkit-postgres:
        condition: service_healthy
      mtx-toolkit-redis:
        condition: service_started

  mtx-toolkit-celery-beat:
    profiles: [build]
    build:
      context: ./addons/mtx-toolkit/backend
      dockerfile: Dockerfile
    container_name: mtx-toolkit-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://mtx:mtx_password@mtx-toolkit-postgres:5432/mtx_toolkit
      REDIS_URL: redis://mtx-toolkit-redis:6379/0
    depends_on:
      mtx-toolkit-postgres:
        condition: service_healthy
      mtx-toolkit-redis:
        condition: service_started

volumes:
  mtx_toolkit_pg_data:
  mtx_toolkit_redis_data:
